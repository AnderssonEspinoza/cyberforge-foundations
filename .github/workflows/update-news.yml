name: Update News Feed

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Refresh noticias.json
        run: npm run scrape

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add noticias.json package-lock.json
          git diff --cached --quiet || git commit -m "Actualizar feed de noticias"
          git push
