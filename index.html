  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const STORAGE_KEY = "cyberforge_foundations_v3";
    const LESSON_STATES = ["confundido", "repasar", "entendido", "dominado"];
    const GLOSSARY = [
      { term: "CVE", def: "Identificador publico de una vulnerabilidad conocida." },
      { term: "RCE", def: "Remote Code Execution, ejecucion remota de codigo." },
      { term: "LPE", def: "Local Privilege Escalation, escalada local de privilegios." },
      { term: "MITM", def: "Intercepcion o manipulacion de una comunicacion entre dos extremos." },
      { term: "TTP", def: "Tactics, Techniques and Procedures de un adversario." },
      { term: "IOC", def: "Indicador observable de posible compromiso." },
      { term: "Kerberoasting", def: "Solicitud de tickets de servicio Kerberos para crackeo offline." },
      { term: "SSRF", def: "Server-Side Request Forgery." },
      { term: "XSS", def: "Ejecucion de JavaScript malicioso en el navegador de la victima." },
      { term: "SQLi", def: "Inyeccion SQL sobre entradas no validadas." },
      { term: "SUID", def: "Bit especial de Linux que ejecuta con permisos del propietario." },
      { term: "C2", def: "Infraestructura de mando y control de un atacante." },
      { term: "WAF", def: "Firewall de aplicacion web." },
      { term: "IDS", def: "Sistema de deteccion de intrusiones." },
      { term: "IPS", def: "Sistema de prevencion de intrusiones." },

    const LEVELS = [
      { id: "nivel-0", title: "Nivel 0", focus: "Vocabulario, redes, sistema operativo, leer noticias sin perderte." },
      { id: "fundamentos", title: "Fundamentos", focus: "Protocolos, autenticacion, web, hardening, logs y metodo." },
      { id: "junior", title: "Junior", focus: "Labs guiados, analisis, deteccion y priorizacion aplicada." },
      { id: "intermedio", title: "Intermedio", focus: "Relacionar identidad, cloud, vulnerabilidades y respuesta." }
    ];

    const STUDY_GUIDE = [
      { title: "Como estudiar", points: ["Empieza por redes, sistemas, identidad y web.", "No persigas herramientas antes de entender fundamentos.", "Lee una leccion, haz un mini lab y escribe lo que entendiste con tus palabras."] },
      { title: "Que leer primero", points: ["Fundamentos estables: red, sistema operativo, autenticacion, control de acceso, logs y metodologias.", "Guias oficiales, glosario, laboratorios pequenos y writeups explicados.", "Recursos que te permitan conectar teoria con comportamiento real."] },
      { title: "Que ignorar al inicio", points: ["Hype sin contexto.", "Listas infinitas de herramientas.", "Noticias sin relacion con activos o fundamentos.", "La necesidad de aprender cinco ramas al mismo tiempo."] },
      { title: "Como no perderte", points: ["Usa la ruta por niveles y no saltes a modulos avanzados solo por curiosidad.", "Si una noticia te abruma, traducela a un fundamento: identidad, control de acceso, secretos, segmentacion o deteccion.", "Si no puedes explicarlo sencillo, vuelve un paso atras y repasa."] },
      { title: "Como filtrar noticias", points: ["Mira fuente, fecha, producto afectado y explotacion activa.", "Cruza el aviso con tu inventario y exposicion.", "Relaciona cada noticia con un fundamento estable.", "Pregunta siempre: nos afecta, esta expuesto, hay mitigacion, hay evidencia de abuso real."] },
      { title: "Como pasar de teoria a practica", points: ["Lee una leccion, haz el mini lab y responde las preguntas antes de seguir.", "Escribe una nota corta: que entendi, que me confundio y que debo repasar.", "Luego revisa una noticia relacionada y trata de explicarla usando lo aprendido."] },
      { title: "Rutina recomendada de 20 a 30 minutos", points: ["10-12 min de lectura guiada.", "5-8 min de mini lab o reflexion aplicada.", "3-5 min de flashcards.", "3-5 min de una noticia o advisory relacionado."] },
      { title: "Como saber si avanzar de nivel", points: ["Puedes explicar conceptos sin leer la pantalla.", "Relacionas una noticia con un fundamento sin perderte.", "Respondes bien quizzes basicos y aplicados, no solo por memoria.", "Tus notas muestran menos confusion y mas criterio."] }
    ];

    const ROLE_TRACKS = [
      { id: "blue", title: "Quiero Blue Team", focus: "Logs, deteccion, hardening, hunting e IR.", recommended: ["m1", "m2", "m8", "m9", "m10"] },
      { id: "pentest", title: "Quiero Pentesting", focus: "Redes, web, sistemas y metodologia.", recommended: ["m1", "m2", "m4", "m5", "m9"] },
      { id: "appsec", title: "Quiero AppSec", focus: "Web, autenticacion, control de acceso y SDLC.", recommended: ["m3", "m4", "m5", "m10"] },
      { id: "cloud", title: "Quiero Cloud Security", focus: "Identidad, secretos, permisos y priorizacion.", recommended: ["m3", "m8", "m9", "m10"] }
    ];

    const R = {
      redes: {
        official: [{ title: "Cloudflare Learning Center", url: "https://www.cloudflare.com/learning/network-layer/what-is-the-osi-model/" }],
        practical: [{ title: "Wireshark Guide", url: "https://www.wireshark.org/docs/wsug_html_chunked/" }],
        optional: [{ title: "Cisco NetAcad", url: "https://www.netacad.com/" }]
      },
      sistemas: {
        official: [{ title: "Microsoft Learn Security", url: "https://learn.microsoft.com/windows/security/" }],
        practical: [{ title: "GTFOBins", url: "https://gtfobins.github.io/" }],
        optional: [{ title: "Linux Journey", url: "https://linuxjourney.com/" }]
      },
      cripto: {
        official: [{ title: "NIST Cryptography", url: "https://www.nist.gov/cryptography" }],
        practical: [{ title: "OWASP Cryptographic Failures", url: "https://owasp.org/Top10/es/A02_2021-Cryptographic_Failures/" }],
        optional: [{ title: "CyberChef", url: "https://gchq.github.io/CyberChef/" }]
      },
      web: {
        official: [{ title: "OWASP Top 10", url: "https://owasp.org/Top10/2021/es/" }],
        practical: [{ title: "PortSwigger Academy", url: "https://portswigger.net/web-security" }],
        optional: [{ title: "OWASP Cheat Sheets", url: "https://cheatsheetseries.owasp.org/" }]
      },
      pentest: {
        official: [{ title: "PTES", url: "http://www.pentest-standard.org/" }],
        practical: [{ title: "OWASP WSTG", url: "https://owasp.org/www-project-web-security-testing-guide/" }],
        optional: [{ title: "Nmap Book", url: "https://nmap.org/book/" }]
      },
      malware: {
        official: [{ title: "CISA Advisories", url: "https://www.cisa.gov/news-events/cybersecurity-advisories" }],
        practical: [{ title: "ANY.RUN", url: "https://any.run/" }],
        optional: [{ title: "Ghidra", url: "https://ghidra-sre.org/" }]
      },
      social: {
        official: [{ title: "CISA Phishing Guidance", url: "https://www.cisa.gov/topics/cybersecurity-best-practices/phishing-guidance-stopping-attack-cycle-at-phase-one" }],
        practical: [{ title: "Google Phishing Quiz", url: "https://phishingquiz.withgoogle.com/" }],
        optional: [{ title: "FIDO Alliance", url: "https://fidoalliance.org/" }]
      },
      blue: {
        official: [{ title: "MITRE ATT&CK", url: "https://attack.mitre.org/" }],
        practical: [{ title: "Sigma Rules", url: "https://github.com/SigmaHQ/sigma" }],
        optional: [{ title: "NIST 800-61", url: "https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final" }]
      },
      ad: {
        official: [{ title: "Microsoft AD Overview", url: "https://learn.microsoft.com/windows-server/identity/ad-ds/get-started/virtual-dc/active-directory-domain-services-overview" }],
        practical: [{ title: "PingCastle", url: "https://www.pingcastle.com/" }],
        optional: [{ title: "Defender for Identity", url: "https://learn.microsoft.com/defender-for-identity/" }]
      },
      cloud: {
        official: [{ title: "AWS Security Pillar", url: "https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html" }],
        practical: [{ title: "CISA KEV", url: "https://www.cisa.gov/known-exploited-vulnerabilities-catalog" }],
        optional: [{ title: "NVD", url: "https://nvd.nist.gov/" }]
      }
    };

    const L = (id, title, summary, content, lab, mistakes, sources) => ({ id, title, summary, content, lab, mistakes, sources });

    const MODULES = [
      {
        id: "m1", title: "Fundamentos de Redes", stage: "nivel-0", desc: "OSI, TCP/IP, puertos, DNS y segmentacion.",
        lessons: [
          L("m1l1", "Capas, TCP y puertos", "Aprende a leer la red por capas y a no confundir servicio con riesgo.", `
            <h3>Leer la red por capas</h3>
            <p>El modelo por capas te ayuda a ubicar controles y fallos. Si hablas de direccionamiento o gateways, estas en red; si hablas de HTTP o autenticacion web, estas en aplicacion. Esta separacion evita mezclar sintomas con causas.</p>
            <h3>TCP, UDP y puertos</h3>
            <p>TCP mantiene estado y por eso es clave para SSH, SMB, RDP o HTTP. UDP sacrifica estado por rapidez y aparece en DNS o streaming. Un puerto no hace seguro a un servicio; solo te da una pista inicial sobre que vive detras.</p>
          `, { title: "Mini lab", steps: ["Elige 8 puertos comunes y escribe su servicio esperado.", "Marca cuales deberian estar restringidos a VPN o red interna."], questions: ["¿Por que un puerto no estandar no elimina el riesgo?", "¿Que diferencia practica aporta TCP frente a UDP?"] }, ["Pensar que cambiar de puerto equivale a proteger.", "Creer que un control de red arregla una vulnerabilidad web."], R.redes),
          L("m1l2", "DNS, ARP, DHCP y segmentacion", "La red local sigue importando mucho en oficinas, labs y entornos mixtos.", `
            <h3>DNS como mapa de arquitectura</h3>
            <p>DNS resuelve nombres, pero tambien revela proveedores, subdominios, correo y dependencias. Para defensa, un patron raro de consultas puede delatar abuso o exfiltracion.</p>
            <h3>ARP, DHCP y confianza local</h3>
            <p>ARP y DHCP son piezas basicas de la red local. Cuando no hay segmentacion ni higiene, pueden facilitar desvio de trafico, ${GLOSSARY.find(x => x.term === "MITM").term} y exposicion innecesaria. La defensa real combina segmentacion, WiFi bien configurado y visibilidad.</p>
          `, { title: "Mini lab", steps: ["Dibuja una red pequena con router, DNS, DHCP y 4 equipos.", "Marca que cambiaria si separas invitados, oficina y administracion."], questions: ["¿Que problema resuelve la segmentacion?", "¿Por que la red local no es automaticamente confiable?"] }, ["Subestimar DNS y la red local.", "Creer que todo lo interno ya es seguro."], R.redes)
        ],
        flashcards: [{ q: "¿Que te da un puerto abierto?", a: "Una pista del servicio, no una garantia sobre su seguridad." }, { q: "¿Que reduce mucho el impacto de problemas locales como desvio de trafico?", a: "La segmentacion." }],
        quizzes: {
          basico: [{ q: "¿Que describe mejor a TCP?", options: ["Sin estado", "Orientado a conexion", "No usa puertos", "Solo sirve para correo"], correct: 1, explanation: "TCP mantiene una conversacion y usa puertos y estados." }],
          aplicado: [{ q: "Si ves DNS raro hacia dominios poco comunes, ¿que hipotesis inicial vale la pena revisar?", options: ["Exfiltracion o uso anomalo", "Solo pantalla azul", "Solo temperatura", "Cambio de wallpaper"], correct: 0, explanation: "DNS tambien sirve para deteccion y no solo para resolucion." }],
          escenario: [{ q: "Una oficina plana sin segmentacion recibe un dispositivo desconocido y usuarios ven paginas extranas. ¿Que fundamento explica mejor el riesgo?", options: ["Confianza local y red mal segmentada", "Solo HTML", "Solo backup", "Solo mouse"], correct: 0, explanation: "El problema nace del diseno de red y la confianza local." }]
        }
      },
      {
        id: "m2", title: "Sistemas Operativos", stage: "nivel-0", desc: "Permisos, procesos, servicios, registro y minimo privilegio.",
        lessons: [
          L("m2l1", "Linux: permisos y escalada", "La mayoria de escaladas locales nacen de mal diseno o exceso de privilegios.", `
            <h3>Permisos con contexto</h3>
            <p>En Linux importan owner, grupo, permisos, procesos y automatizaciones. Un cron de root editable, un binario con ${GLOSSARY.find(x => x.term === "SUID").term} o un <code>sudo -l</code> permisivo pueden abrir rutas de escalada sin necesidad de un fallo complejo.</p>
            <h3>Lo que debes aprender</h3>
            <p>No memorices solo comandos. Pregunta siempre que usuario ejecuta una tarea, con que permisos y que archivos toca. Ese razonamiento vale mas que una lista enorme de tecnicas.</p>
          `, { title: "Mini lab", steps: ["Piensa en /etc, /var/log y /home.", "Escribe que daño causaria escritura indebida en cada uno."], questions: ["¿Por que escribir duele mas que leer en muchas rutas?", "¿Que riesgo tiene un cron de root mal protegido?"] }, ["Confundir saber comandos con entender privilegios.", "Usar root por comodidad."], R.sistemas),
          L("m2l2", "Windows: servicios, registro e identidad local", "Windows exige pensar en tokens, servicios y objetos, no solo en archivos.", `
            <h3>Windows se lee distinto</h3>
            <p>Servicios, tareas programadas, registro, cuentas locales y eventos del sistema son piezas criticas. Una ruta sin comillas o un servicio con permisos de escritura indebidos pueden ser tan peligrosos como un binario vulnerable.</p>
            <h3>Minimo privilegio</h3>
            <p>El objetivo no es solo autenticar; es limitar el alcance si una cuenta o servicio cae. En seguridad real importa tanto la contrasena como el blast radius que tiene esa identidad.</p>
          `, { title: "Mini lab", steps: ["Imagina un servicio que corre como SYSTEM.", "Pregunta quien puede editar su ruta o directorio."], questions: ["¿Que mezcla es peligrosa en un servicio?", "¿Por que la cuenta de ejecucion importa tanto?"] }, ["Pensar que una cuenta fuerte compensa privilegios excesivos.", "Ignorar con que usuario corre un servicio."], R.sistemas)
        ],
        flashcards: [{ q: "¿Que comando suele revelar abusos de sudo?", a: "sudo -l" }, { q: "¿Que debes preguntar siempre sobre un servicio?", a: "Con que cuenta corre, que ruta usa y quien puede modificarlo." }],
        quizzes: {
          basico: [{ q: "¿Que reduce mejor el dano de una cuenta robada?", options: ["Mas privilegios", "Minimo privilegio", "Mas procesos", "Mas escritorio remoto"], correct: 1, explanation: "Menos privilegios implican menor alcance." }],
          aplicado: [{ q: "Un script ejecutado por root es editable por usuarios. ¿Que aparece?", options: ["Escalada por automatizacion", "Mejor backup", "Menos logs", "Mas MFA"], correct: 0, explanation: "La automatizacion privilegiada se vuelve un vector directo." }],
          escenario: [{ q: "Una empresa guarda credenciales admin en scripts compartidos. ¿Que rompe?", options: ["Solo DNS", "Control de secretos y minimo acceso", "Solo HTML", "Solo TCP"], correct: 1, explanation: "El problema es de gestion de secretos y privilegios." }]
        }
      },
      {
        id: "m3", title: "Criptografia", stage: "fundamentos", desc: "Cifrado, hashing, TLS y gestion de secretos.",
        lessons: [
          L("m3l1", "Cifrado, hashing y errores conceptuales", "Diferenciar funciones criptograficas evita muchos errores de principiante.", `
            <h3>Funciones distintas</h3>
            <p>El cifrado protege confidencialidad, el hashing crea huellas y la derivacion de contrasenas busca resistir crackeo offline. Confundir hash con cifrado o usar un hash rapido para passwords sigue siendo un error muy comun.</p>
            <h3>La clave suele ser el problema</h3>
            <p>Un algoritmo fuerte no compensa una clave expuesta en un repositorio o un token sin expiracion. La seguridad criptografica depende tanto del manejo operativo como de la matematica.</p>
          `, { title: "Mini lab", steps: ["Haz una tabla con AES, RSA, SHA-256 y Argon2.", "Escribe un uso correcto e incorrecto para dos de ellos."], questions: ["¿Por que un hash rapido no sirve para contrasenas?", "¿Que vale mas cuidar: el algoritmo o la clave?"] }, ["Confundir hash con cifrado.", "Pensar que el algoritmo compensa una mala gestion del secreto."], R.cripto),
          L("m3l2", "TLS, certificados y secretos", "HTTPS ayuda mucho, pero no convierte una app vulnerable en una app segura.", `
            <h3>TLS si, magia no</h3>
            <p>TLS protege el canal si validas certificados y contexto correctamente. Si aceptas cualquier certificado, abres la puerta a ${GLOSSARY.find(x => x.term === "MITM").term}. El candado no dice nada sobre autorizacion o logica rota.</p>
            <h3>Secretos y rotacion</h3>
            <p>Tokens, API keys y certificados deben rotar, expirar y vivir en el menor numero de lugares posible. La disciplina de secretos vale en apps, sistemas y cloud.</p>
          `, { title: "Mini lab", steps: ["Piensa en una app con HTTPS pero sin control de acceso correcto.", "Escribe tres riesgos que seguirian existiendo."], questions: ["¿Que protege HTTPS y que no?", "¿Por que un secreto olvidado es tan peligroso?"] }, ["Pensar que HTTPS = app segura.", "No planear expiracion ni revocacion de secretos."], R.cripto)
        ],
        flashcards: [{ q: "¿Que se usa hoy para contrasenas: SHA-1 o Argon2?", a: "Argon2 o bcrypt." }, { q: "¿Que no garantiza HTTPS?", a: "Que la logica de la aplicacion sea segura." }],
        quizzes: {
          basico: [{ q: "¿Que deberias usar para contrasenas?", options: ["MD5", "Argon2 o bcrypt", "Base64", "RSA"], correct: 1, explanation: "Se necesitan funciones lentas y adaptativas." }],
          aplicado: [{ q: "Una app acepta cualquier certificado TLS. ¿Que falla central tiene?", options: ["Mas puertos", "Canal sin autenticidad real", "DNS roto", "Mas hashing"], correct: 1, explanation: "Sin validacion del certificado no hay autenticidad confiable." }],
          escenario: [{ q: "Una clave privada de produccion aparece en el repo. ¿Que hacer?", options: ["Dejarla si el repo es privado", "Rotarla y revisar alcance", "Solo ocultar el commit", "Cambiar nombre"], correct: 1, explanation: "Un secreto expuesto debe asumirse comprometido." }]
        }
      },
      {
        id: "m4", title: "Seguridad Web", stage: "fundamentos", desc: "Entradas, sesiones, autorizacion, XSS y APIs.",
        lessons: [
          L("m4l1", "Entradas hostiles e inyeccion", "La aplicacion debe asumir que toda entrada puede ser manipulada.", `
            <h3>No confies en la entrada</h3>
            <p>Formularios, cookies, headers, JSON y parametros pueden ser manipulados. ${GLOSSARY.find(x => x.term === "SQLi").term} es el ejemplo clasico, pero la idea grande es separar datos de instrucciones y validar por contexto.</p>
            <h3>Backend como frontera real</h3>
            <p>El frontend no es un control de seguridad. Si el backend confia en el cliente, la inyeccion o la manipulacion terminan apareciendo tarde o temprano.</p>
          `, { title: "Mini lab", steps: ["Lista todas las entradas de una app simple: login, busqueda, perfil.", "Marca cuales podrian terminar en DB, logs o shell."], questions: ["¿Por que el frontend no basta?", "¿Que significa validar por contexto?"] }, ["Creer que validar en JS es suficiente.", "Pensar que inyeccion solo significa SQL."], R.web),
          L("m4l2", "Autorizacion, sesiones y navegador", "Muchos fallos graves vienen de autorizar mal, no solo de autenticar mal.", `
            <h3>Autenticacion no es autorizacion</h3>
            <p>Una sesion valida no significa acceso correcto a cualquier recurso. Si cambiando un ID ves datos ajenos, el problema es control de acceso roto. Los JWT tampoco arreglan esto por si solos.</p>
            <h3>XSS y CSRF</h3>
            <p>${GLOSSARY.find(x => x.term === "XSS").term} importa porque roba contexto del navegador. CSRF explota que el navegador envia estado automaticamente. Para entender web de verdad debes entender tambien como piensa el navegador.</p>
          `, { title: "Mini lab", steps: ["Imagina /api/facturas/1005 y cambialo a 1006.", "Escribe que debe verificar el backend antes de responder."], questions: ["¿Donde vive la autorizacion real?", "¿Que vuelve peligrosa a una sesion robada?"] }, ["Pensar que login correcto implica acceso correcto.", "Creer que JWT elimina la necesidad de revisar permisos por recurso."], R.web)
        ],

    function getInitialState() {

        const raw = localStorage.getItem(STORAGE_KEY);

            lessonStates: parsed.lessonStates || {},
            lessonNotes: parsed.lessonNotes || {},
            streak: parsed.streak || 0,
            lastActiveDate: parsed.lastActiveDate || null,
            xp: parsed.xp || 0,
            readNews: parsed.readNews || [],

      return { completedLessons: [], lessonStates: {}, lessonNotes: {}, streak: 0, lastActiveDate: null, xp: 0, readNews: [], focusMode: false, flashcardQueue: MODULES.flatMap((m) => m.flashcards).map((card) => ({ ...card, dueAt: Date.now() })) };
    }

    function useAppStore() {

        const today = new Date().toISOString().slice(0, 10);
        let streak = prev.streak;
        if (prev.lastActiveDate !== today) {
          const y = new Date();
          y.setDate(y.getDate() - 1);
          const ys = y.toISOString().slice(0, 10);
          streak = prev.lastActiveDate === ys ? prev.streak + 1 : 1;
        }
        return { streak, today };
      };
      const markLessonCompleted = (lessonId) => setState((prev) => {
        const { streak, today } = touchDay(prev);
        return { ...prev, completedLessons: prev.completedLessons.includes(lessonId) ? prev.completedLessons : [...prev.completedLessons, lessonId], streak, lastActiveDate: today, xp: prev.completedLessons.includes(lessonId) ? prev.xp : prev.xp + 60 };

        const { streak, today } = touchDay(prev);
        return { ...prev, lessonStates: { ...prev.lessonStates, [lessonId]: status }, streak, lastActiveDate: today, xp: prev.xp + 5 };
      });
      const saveLessonNote = (lessonId, value) => setState((prev) => ({ ...prev, lessonNotes: { ...prev.lessonNotes, [lessonId]: value } }));

    const QuizView = () => {
      const { moduleId } = useParams();
      const { markLessonCompleted } = React.useContext(AppContext);
      const navigate = useNavigate();
      const module = MODULES.find((item) => item.id === moduleId);
      const [difficulty, setDifficulty] = useState("basico");
      const [current, setCurrent] = useState(0);
      const [score, setScore] = useState(0);
      const [selected, setSelected] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [finished, setFinished] = useState(false);
      useEffect(() => { setCurrent(0); setScore(0); setSelected(null); setAnswered(false); setFinished(false); }, [difficulty, moduleId]);
      if (!module) return <div>Modulo no encontrado.</div>;
      const questions = module.quizzes[difficulty];
      const question = questions[current];
      const choose = (idx) => { if (answered) return; setSelected(idx); setAnswered(true); if (idx === question.correct) setScore((prev) => prev + 1); };
      const next = () => {
        if (current === questions.length - 1) {
          setFinished(true);
          if (score / questions.length >= 0.6) markLessonCompleted(module.lessons[0].id);
          return;
        }
        setCurrent((prev) => prev + 1); setSelected(null); setAnswered(false);
      };
      if (finished) {
        const passed = score / questions.length >= 0.6;
        return <div className="pb-24"><Card className="max-w-xl mx-auto text-center"><h2 className={`text-3xl font-bold ${passed ? "text-term-prim" : "text-red-400"}`}>{passed ? "Evaluacion superada" : "Necesitas reforzar conceptos"}</h2><p className="text-term-mut mt-3">Resultado {score}/{questions.length} en dificultad {difficulty}.</p><div className="flex gap-3 justify-center mt-6"><button onClick={() => navigate(`/module/${module.id}`)} className="px-5 py-3 rounded-xl border border-term-mut/30">Volver al modulo</button><button onClick={() => navigate(`/lesson/${module.id}/${module.lessons[0].id}`)} className="px-5 py-3 rounded-xl bg-term-prim text-black font-bold">Repasar</button></div></Card></div>;
      }
      return (
        <div className="max-w-3xl mx-auto pb-24">
          <div className="flex flex-wrap gap-2 mb-6">{["basico", "aplicado", "escenario"].map((item) => <button key={item} onClick={() => setDifficulty(item)} className={`px-4 py-2 rounded-full border text-sm ${difficulty === item ? "border-term-acc text-term-acc bg-term-acc/10" : "border-term-mut/30 text-term-mut"}`}>{item}</button>)}</div>
          <div className="flex justify-between text-xs text-term-mut mb-3"><span>{module.title}</span><span>{difficulty} {current + 1}/{questions.length}</span></div>
          <div className="h-2 bg-black rounded-full border border-term-mut/30 overflow-hidden mb-8"><div className="h-full bg-term-acc" style={{ width: `${(current / questions.length) * 100}%` }}></div></div>
          <h2 className="text-2xl font-bold mb-8">{question.q}</h2>
          <div className="space-y-3">
            {question.options.map((option, idx) => {
              const ok = answered && idx === question.correct;
              const bad = answered && idx === selected && idx !== question.correct;
              return <button key={option} onClick={() => choose(idx)} disabled={answered} className={`w-full text-left p-4 rounded-2xl border ${ok ? "border-term-prim text-term-prim bg-term-prim/10" : bad ? "border-red-500 text-red-400 bg-red-500/10" : "border-term-mut/30 hover:border-term-acc"}`}><span className="opacity-60 mr-3">[{["A","B","C","D"][idx]}]</span>{option}</button>;
            })}
          </div>
          {answered && <Card className="mt-6"><div className="font-bold text-term-acc">Explicacion</div><p className="text-sm text-term-text mt-3">{question.explanation}</p></Card>}
          {answered && <button onClick={next} className="w-full mt-6 py-4 rounded-2xl bg-term-prim text-black font-bold">{current === questions.length - 1 ? "Finalizar" : "Siguiente"}</button>}
        </div>
      );
    };

    const SettingsView = () => {

      const exportData = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `cyberforge-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };
      const importData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try { localStorage.setItem(STORAGE_KEY, event.target.result); window.location.reload(); } catch (error) { alert("Backup invalido."); }
        };
        reader.readAsText(file);
      };
      return (
        <div className="space-y-5 pb-24">
          <div><h2 className="text-2xl font-bold text-term-prim">Configuracion</h2><p className="text-sm text-term-mut mt-2">Todo tu progreso se guarda localmente en este navegador.</p></div>
          <Card><div className="flex items-center justify-between gap-4"><div><div className="font-bold">Modo enfoque</div><div className="text-sm text-term-mut mt-2">Reduce distracciones visuales durante lecturas largas.</div></div><button onClick={toggleFocusMode} className={`px-4 py-2 rounded-xl border ${state.focusMode ? "border-term-prim text-term-prim" : "border-term-mut/30 text-term-mut"}`}>{state.focusMode ? "Activo" : "Inactivo"}</button></div></Card>
          <Card><div className="flex flex-col gap-3"><button onClick={exportData} className="w-full py-3 rounded-xl border border-term-mut/30">Exportar progreso</button><label className="w-full py-3 rounded-xl border border-term-mut/30 text-center cursor-pointer">Importar progreso<input type="file" accept=".json" className="hidden" onChange={importData} /></label><button onClick={() => { localStorage.removeItem(STORAGE_KEY); window.location.reload(); }} className="w-full py-3 rounded-xl border border-red-500/40 text-red-400">Borrar progreso local</button></div></Card>
        </div>
      );
    };

    const Layout = ({ children }) => {
      const location = useLocation();
      const navItems = [
        { path: "/", label: "Inicio", icon: "house" },
        { path: "/roadmap", label: "Ruta", icon: "milestone" },
        { path: "/guide", label: "Guia", icon: "book-open" },
        { path: "/modules", label: "Modulos", icon: "library" },
        { path: "/glossary", label: "Glosario", icon: "book-a" },
        { path: "/tracks", label: "Tracks", icon: "compass" },
        { path: "/flashcards", label: "Flash", icon: "layers" },
        { path: "/news", label: "Noticias", icon: "newspaper" },
        { path: "/settings", label: "Config", icon: "settings" }
      ];
      useEffect(() => { lucide.createIcons(); });
      return (
        <div className="min-h-screen max-w-6xl mx-auto px-4 md:px-8 pt-6 pb-28 relative z-10">
          <AnimatePresence mode="wait">
            <motion.div key={location.pathname} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }}>
              {children}
            </motion.div>
          </AnimatePresence>
          <nav className="fixed bottom-0 left-0 right-0 glass-panel border-t border-term-mut/20 rounded-t-3xl px-2 py-3 z-50">
            <div className="max-w-6xl mx-auto flex gap-1 overflow-x-auto hide-scrollbar">
              {navItems.map((item) => {
                const active = location.pathname === item.path || (item.path !== "/" && location.pathname.startsWith(item.path));
                return <Link key={item.path} to={item.path} className={`min-w-[80px] flex flex-col items-center gap-1 px-3 py-2 rounded-xl ${active ? "text-term-prim" : "text-term-mut"}`}><i data-lucide={item.icon} className="w-5 h-5"></i><span className="text-[10px] uppercase">{item.label}</span></Link>;
              })}
            </div>
          </nav>
        </div>
      );
    };

    const MainApp = () => {
      const store = useAppStore();
      useEffect(() => { document.body.style.background = store.state.focusMode ? "#040404" : ""; }, [store.state.focusMode]);
      return (
        <AppContext.Provider value={store}>
          <HashRouter>
            <Layout>
              <Routes>
                <Route path="/" element={<Dashboard />} />
                <Route path="/roadmap" element={<RoadmapView />} />
                <Route path="/guide" element={<GuideView />} />
                <Route path="/tracks" element={<TracksView />} />
                <Route path="/glossary" element={<GlossaryView />} />
                <Route path="/modules" element={<ModuleListView />} />
                <Route path="/module/:moduleId" element={<ModuleDetailView />} />
                <Route path="/lesson/:moduleId/:lessonId" element={<LessonView />} />
                <Route path="/flashcards" element={<FlashcardsView />} />
                <Route path="/quiz/:moduleId" element={<QuizView />} />
                <Route path="/news" element={<NewsView />} />
                <Route path="/settings" element={<SettingsView />} />
              </Routes>
            </Layout>
          </HashRouter>
        </AppContext.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<MainApp />);
  </script>
</body>
</html>
